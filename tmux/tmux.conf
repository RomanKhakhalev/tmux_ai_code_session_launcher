# Mouse: enable scroll in panes, disable wheel switching windows on status bar
set -g mouse on
set -g mode-keys vi

# PageUp enters copy mode and scrolls up immediately
bind -n PageUp copy-mode -u

# Copy mouse selection to system clipboard on release
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.local/bin/tmux-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.local/bin/tmux-copy"

# Window navigation
#
# macOS + Linux: Option/Alt + h / l  (vim-style, no conflicts)
bind-key -n M-h previous-window
bind-key -n M-l next-window
# New windows and splits inherit the current pane's working directory.
bind-key c new-window -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key % split-window -h -c "#{pane_current_path}"
# macOS + Linux: Option/Alt + Shift + [ / ]  (^[{ / ^[})
bind-key -n "M-{" previous-window
bind-key -n "M-}" next-window

# Disable mouse wheel switching windows on status bar
unbind-key -T root WheelUpStatus
unbind-key -T root WheelDownStatus
unbind-key -T root MouseDown3Status
unbind-key -T root MouseDown3StatusLeft
unbind-key -T root M-MouseDown3Status
unbind-key -T root M-MouseDown3StatusLeft

bind-key -T root MouseDown3Status display-menu -T "#[align=centre]#{window_index}:#{window_name}" -t = -x W -y W \
  "#{?#{>:#{session_windows},1},,-}Swap Left" l { swap-window -t :-1 } \
  "#{?#{>:#{session_windows},1},,-}Swap Right" r { swap-window -t :+1 } \
  "#{?pane_marked_set,,-}Swap Marked" s { swap-window } \
  '' Kill X { kill-window } Respawn R { respawn-window -k } "#{?pane_marked,Unmark,Mark}" m { select-pane -m } \
  Rename n { command-prompt -F -I "#W" { rename-window -t "#{window_id}" "%%" } } \
  '' "New After" w { new-window -a -c "#{pane_current_path}" } "New At End" W { new-window -c "#{pane_current_path}" }

bind-key -T root MouseDown3StatusLeft display-menu -T "#[align=centre]#{session_name}" -t = -x M -y W \
  Next n { switch-client -n } Previous p { switch-client -p } \
  '' Renumber N { move-window -r } Rename n { command-prompt -I "#S" { rename-session "%%" } } \
  '' "New Session" s { new-session } "New Window" w { new-window -c "#{pane_current_path}" }

bind-key -T root M-MouseDown3Status display-menu -T "#[align=centre]#{window_index}:#{window_name}" -t = -x W -y W \
  "#{?#{>:#{session_windows},1},,-}Swap Left" l { swap-window -t :-1 } \
  "#{?#{>:#{session_windows},1},,-}Swap Right" r { swap-window -t :+1 } \
  "#{?pane_marked_set,,-}Swap Marked" s { swap-window } \
  '' Kill X { kill-window } Respawn R { respawn-window -k } "#{?pane_marked,Unmark,Mark}" m { select-pane -m } \
  Rename n { command-prompt -F -I "#W" { rename-window -t "#{window_id}" "%%" } } \
  '' "New After" w { new-window -a -c "#{pane_current_path}" } "New At End" W { new-window -c "#{pane_current_path}" }

bind-key -T root M-MouseDown3StatusLeft display-menu -T "#[align=centre]#{session_name}" -t = -x M -y W \
  Next n { switch-client -n } Previous p { switch-client -p } \
  '' Renumber N { move-window -r } Rename n { command-prompt -I "#S" { rename-session "%%" } } \
  '' "New Session" s { new-session } "New Window" w { new-window -c "#{pane_current_path}" }

# macOS only: Cmd+Shift+[ / Cmd+Shift+]
# Verify exact sequences with `cat -v` if these don't work on your terminal
if-shell "uname -s | grep -q Darwin" {
  bind-key -n "\e[1;6D" previous-window
  bind-key -n "\e[1;6C" next-window
}
